version: "3"

services:
  prod-postgres:
    image: postgres:17-alpine
    container_name: prod_global_postgres_db
    restart: always
    # command: postgres -c 'max_connections=100'
    command: postgres -c 'max_connections=200' -c 'shared_buffers=512MB'
    environment:
      - POSTGRES_DB=${PROD_POSTGRES_DB}
      - POSTGRES_USER=${PROD_POSTGRES_USER}
      - POSTGRES_PASSWORD=${PROD_POSTGRES_PASSWORD}
    volumes:
      - ./prod_global_postgres_db:/var/lib/postgresql/data
    networks:
      - prod_network

    depends_on:
      - prod-prepare-pgbouncer

    ports:
      - "5442:5432"

  # prod-pgadmin:
  #   image: dpage/pgadmin4
  #   container_name: prod_global_pgadmin4_container
  #   restart: always
  #   ports:
  #     - "${PROD_PGADMIN_PORT}:80"
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: ${PROD_PGADMIN_DEFAULT_EMAIL}
  #     PGADMIN_DEFAULT_PASSWORD: ${PROD_PGADMIN_DEFAULT_PASSWORD}
  #   volumes:
  #     - ./prod_global_postgres_admin:/var/lib/postgresql/data/admin
  #   networks:
  #     - prod_network

  prod-redis:
    image: redis:latest
    restart: always
    container_name: prod_redis
    env_file: .env
    ports:
      - "6379:6379"
    networks:
      - prod_network

  prod-pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: prod_pgbouncer
    restart: always
    networks:
      - prod_network
    ports:
      - "7432:5432"
    depends_on:
      - prod-postgres
    environment:
      - DB_USER=${PROD_POSTGRES_USER}
      - DB_PASSWORD=${PROD_POSTGRES_PASSWORD}
      - DB_HOST=prod-postgres
      - AUTH_TYPE=scram-sha-256
      - POOL_MODE=transaction
      - ADMIN_USERS=postgres,${PROD_POSTGRES_USER}
      - MAX_CLIENT_CONN=10000
      - DEFAULT_POOL_SIZE=200
      - SERVER_RESET_QUERY=DISCARD ALL


  prod-prepare-pgbouncer:
    image: prod-pgbouncer-prepare
    container_name: prod_pgbouncer_prepare
    build:
      context: .
      dockerfile: Dockerfile.pgbouncer

  prod-rabbitmq:
    image: rabbitmq:3.13-management
    container_name: prod_rabbitmq
    restart: always
    hostname: rabbitmq
    ports:
      - "${PROD_RABBITMQ_EXPOSE_PORT}:5672"
      - "${PROD_RABBITMQ_MANAGEMENT_EXPOSE_PORT}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${PROD_RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${PROD_RABBITMQ_PASS}
    volumes:
      - ./prod_rabbitmq_data:/var/lib/rabbitmq
      - ./configs/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    networks:
      - prod_network

    # stop_grace_period: 30s



  prod-kafka:
    image: apache/kafka:3.9.0
    container_name: prod_kafka
    restart: always
    ports:
      - "5192:9092"
      - "25192:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

    # import uuid
    # import base64
    # u = uuid.uuid4()
    # cluster_id = base64.urlsafe_b64encode(u.bytes).decode().rstrip("=")
    # print(cluster_id)
      KAFKA_CLUSTER_ID: ${PROD_KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}
      KAFKA_LISTENERS: B-INTERNAL://:29092,B-EXTERNAL://:9092,CONTROLLER://:9093
      # PROD: replace localhost with actual server IP or domain
      KAFKA_ADVERTISED_LISTENERS: B-INTERNAL://prod-kafka:29092,B-EXTERNAL://prod-kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: B-INTERNAL:PLAINTEXT,B-EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: B-INTERNAL

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      # PROD: set a retention byte limit to prevent disk from filling up (default is unlimited)
      # Example: 10737418240 = 10GB per partition
      # KAFKA_LOG_RETENTION_BYTES: 10737418240
    volumes:
      # PROD: replace Docker-managed volume with an explicit path for easier backup and monitoring
      # Example: - /data/kafka:/var/lib/kafka/data
      - ./kafka-data:/var/lib/kafka/data

    networks:
      - prod_network
networks:
  prod_network:
    name: prod_network